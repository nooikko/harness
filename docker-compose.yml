services:
  postgres:
    image: postgres:17-alpine
    container_name: harness-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: harness
    volumes:
      - harness-pgdata:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:v1.17.0
    container_name: harness-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - harness-qdrant:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334

  loki:
    image: grafana/loki:3.4.3
    container_name: harness-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - harness-loki:/loki
    command: -config.file=/etc/loki/local-config.yaml

  grafana:
    image: grafana/grafana:11.6.0
    container_name: harness-grafana
    restart: unless-stopped
    ports:
      - "3200:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    volumes:
      - harness-grafana:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - loki

  po-token-server:
    image: brainicism/bgutil-ytdlp-pot-provider:1.2.2
    container_name: harness-po-token
    restart: unless-stopped
    ports:
      - "4416:4416"
    environment:
      - TOKEN_TTL=21600

volumes:
  harness-pgdata:
  harness-qdrant:
  harness-loki:
  harness-grafana:
