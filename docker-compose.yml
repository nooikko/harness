services:
  postgres:
    image: postgres:17-alpine
    container_name: harness-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: harness
    volumes:
      - harness-pgdata:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:v1.14.0
    container_name: harness-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - harness-qdrant:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334

volumes:
  harness-pgdata:
  harness-qdrant:
